<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Fond navy -->
  <rect width="32" height="32" rx="8" fill="#1A1A2E"/>

  <!-- Anneau circulaire teal (inspiré des cercles du logo) -->
  <circle cx="16" cy="16" r="13" stroke="#00C9B1" stroke-width="1.5" fill="none" opacity="0.6"/>
  <circle cx="16" cy="16" r="10" stroke="#FF6B35" stroke-width="0.8" fill="none" opacity="0.4"/>

  <!-- Tête du robot (simplifée) -->
  <rect x="10" y="9" width="12" height="10" rx="3" fill="white"/>
  <!-- Antenne -->
  <rect x="15" y="6" width="2" height="3" rx="1" fill="white"/>
  <circle cx="16" cy="6" r="1.5" fill="#FFD60A"/>
  <!-- Yeux / flèches vertes -->
  <circle cx="13" cy="14" r="1.8" fill="#1A1A2E"/>
  <circle cx="19" cy="14" r="1.8" fill="#1A1A2E"/>
  <circle cx="13" cy="14" r="0.9" fill="#00C9B1"/>
  <circle cx="19" cy="14" r="0.9" fill="#00C9B1"/>
  <!-- Corps / bas robot -->
  <rect x="12" y="20" width="8" height="4" rx="2" fill="#FF6B35"/>
  <!-- Flèche vers le haut (croissance) -->
  <path d="M21 13 L23 10 L25 13" stroke="#FFD60A" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <line x1="23" y1="10" x2="23" y2="17" stroke="#FFD60A" stroke-width="1.2" stroke-linecap="round"/>
</svg>
