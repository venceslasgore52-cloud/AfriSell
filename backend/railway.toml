[build]
builder = "nixpacks"
buildCommand = "pip install -r requirements.txt"

[deploy]
startCommand = "python manage.py migrate --noinput && python manage.py collectstatic --noinput && gunicorn AfriSell.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 2 --timeout 120"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
